- name: Volkan` s Update Profile Readme (ESOL_1.1)
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  run: |
    python << 'EOF'
    import requests, os, re

    USER = "VolkanSah"
    TARGET_REPO = "Codey"
    TOKEN = os.getenv("GITHUB_TOKEN")

    HEADERS = {"Authorization": f"Bearer {TOKEN}"}

    # ----------- Releases (letzte 5) -----------
    r = requests.get(
        f"https://api.github.com/repos/{USER}/{TARGET_REPO}/releases",
        headers=HEADERS
    )
    releases = r.json()[:5]

    release_rows = []
    for rel in releases:
        name = rel.get("name") or rel.get("tag_name")
        version = rel.get("tag_name")
        date = (rel.get("published_at") or "")[:10]
        url = rel.get("html_url")
        release_rows.append(f"| {version} | [{name}]({url}) | {date} |")

    release_md = "\n".join(release_rows) if release_rows else "| - | - | - |"

    # ----------- Fixes (letzte 5 commits) -----------
    r = requests.get(
        f"https://api.github.com/repos/{USER}/{TARGET_REPO}/commits",
        headers=HEADERS
    )
    commits = r.json()[:5]

    fix_rows = []
    for c in commits:
        msg = c["commit"]["message"].split("\n")[0]
        date = c["commit"]["author"]["date"][:10]
        url = c.get("html_url")
        fix_rows.append(f"| {date} | [{msg}]({url}) | | ✅ |")  # letzte Spalte statisch ✅

    fix_md = "\n".join(fix_rows) if fix_rows else "| - | - | - | - |"

    # ----------- README Replace -----------
    with open("README.md", "r", encoding="utf-8") as f:
        content = f.read()

    content = re.sub(
        r"<!-- LAST_RELEASED-START -->.*?<!-- LAST_RELEASED-END -->",
        f"<!-- LAST_RELEASED-START -->\n{release_md}\n<!-- LAST_RELEASED-END -->",
        content, flags=re.S
    )

    content = re.sub(
        r"<!-- LAST_FIX-START -->.*?<!-- LAST_FIX-END -->",
        f"<!-- LAST_FIX-START -->\n{fix_md}\n<!-- LAST_FIX-END -->",
        content, flags=re.S
    )

    with open("README.md", "w", encoding="utf-8") as f:
        f.write(content)

    print("✅ README released + fixes updated")
    EOF

